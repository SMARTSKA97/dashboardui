<div class="app-shell min-h-screen flex flex-column">
  <!-- Navbar -->
  <nav
    class="app-navbar flex justify-content-between align-items-center px-3 sm:px-4 lg:px-6 py-3 sticky top-0 z-5">
    <div class="flex align-items-center gap-2 sm:gap-3 min-w-0">
      <p-button
        icon="pi pi-bars"
        severity="secondary"
        [text]="true"
        [rounded]="true"
        styleClass="lg:hidden"
        (onClick)="toggleSidebar()"
        pTooltip="Menu"></p-button>
      <span class="brand-mark p-3 border-round-circle text-white shadow-2 flex-shrink-0">
        <i class="pi pi-chart-line text-xl"></i>
      </span>
      <div class="min-w-0">
        <div class="text-sm sm:text-xl font-bold text-900 tracking-tight text-overflow-ellipsis overflow-hidden white-space-nowrap">
          Financial <span class="text-primary font-light">Dashboard</span>
        </div>
        <div class="text-600 text-xs sm:text-sm">Live operational workspace</div>
      </div>
    </div>

    <div class="flex align-items-center gap-2 sm:gap-4">
      <p-button
        [icon]="isCollapsed() ? 'pi pi-angle-double-right' : 'pi pi-angle-double-left'"
        severity="secondary"
        [text]="true"
        [rounded]="true"
        styleClass="hidden lg:flex"
        (onClick)="toggleCollapse()"
        [pTooltip]="isCollapsed() ? 'Expand Menu' : 'Collapse Menu'"></p-button>
        
      <div class="text-right hidden md:block">
        <div class="text-900 font-bold line-height-1">{{ auth.currentUser()?.userId }}</div>
        <div class="text-600 text-sm line-height-1 mt-1">{{ auth.currentUser()?.role }} | {{ auth.currentUser()?.ddoCode
          }}</div>
      </div>
      <p-avatar [label]="auth.currentUser()?.userId?.charAt(0)" shape="circle" size="large"
        styleClass="bg-primary-50 text-primary font-bold shadow-1"></p-avatar>
      <p-button icon="pi pi-sign-out" (onClick)="auth.logout()" severity="secondary" [rounded]="true" [text]="true"
        pTooltip="Logout"></p-button>
    </div>
  </nav>

  <div class="flex flex-1 position-relative overflow-hidden">
    @if (sidebarOpen()) {
      <button
        type="button"
        class="sidebar-backdrop lg:hidden"
        aria-label="Close navigation"
        (click)="closeSidebar()"></button>
    }

    <!-- Sidebar -->
    <aside
      class="app-sidebar bg-white border-right-1 border-gray-200 flex flex-column py-4 sm:py-5 shadow-1 overflow-x-hidden transition-all transition-duration-300"
      [class.open]="sidebarOpen()"
      [class.collapsed]="isCollapsed()">
      <div class="flex align-items-center justify-content-between px-3 pb-3 lg:hidden">
        <div class="text-900 font-bold">Navigation</div>
        <p-button icon="pi pi-times" severity="secondary" [text]="true" [rounded]="true" (onClick)="closeSidebar()"></p-button>
      </div>
      <div class="flex flex-column gap-2 px-3">
        @for (item of menuItems; track item.label) {
        <a [routerLink]="item.routerLink" routerLinkActive="bg-primary-50 text-primary font-bold shadow-1"
          class="flex align-items-center px-4 py-3 border-round-xl transition-all transition-duration-300 no-underline text-700 hover:bg-gray-100 group overflow-hidden"
          (click)="closeSidebar()"
          [pTooltip]="isCollapsed() ? item.label : ''"
          tooltipPosition="right">
          <i [class]="item.icon" class="text-lg opacity-80 group-hover:opacity-100 flex-shrink-0" [class.mr-3]="!isCollapsed()"></i>
          <span class="white-space-nowrap transition-all transition-duration-300" [class.opacity-0]="isCollapsed()" [class.w-0]="isCollapsed()">{{ item.label }}</span>
        </a>
        }
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="app-content flex-1 overflow-y-auto p-3 sm:p-4 lg:p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
