<div class="flex align-items-center justify-content-center min-h-screen surface-ground p-4">
  <p-card header="Financial Dashboard Login" [style]="{ 'max-width': '400px', 'width': '100%' }" class="shadow-8">
    <p-toast></p-toast>
    <form (ngSubmit)="onLogin()" #loginForm="ngForm">
      <div class="flex flex-column gap-4">
        <div class="flex flex-column gap-2">
          <label for="username">Username</label>
          <input pInputText id="username" name="username" [(ngModel)]="username" placeholder="Enter UserId" required />
        </div>
        <div class="flex flex-column gap-2">
          <label for="password">Password</label>
          <p-password id="password" name="password" [(ngModel)]="password" [feedback]="false" [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" [required]="true"></p-password>
        </div>
        <p-button type="submit" label="Sign In" icon="pi pi-user" [loading]="loading" styleClass="w-full shadow-2 h-3rem"></p-button>
      </div>
    </form>
      
      <div class="mt-4 border-top-1 border-gray-100 pt-4">
        <span class="text-600 font-bold text-xs uppercase tracking-widest block mb-3 text-center">Instant Access (Demo Mode)</span>
        <div class="flex flex-column gap-2">
            <p-button label="Super Admin (Watcher)" icon="pi pi-shield" (onClick)="quickLogin('Admin')" 
                      severity="contrast" [outlined]="true" styleClass="w-full text-left" class="quick-btn"></p-button>
            
            <p-button label="Approver (Authority)" icon="pi pi-check-circle" (onClick)="quickLogin('DDO001_APPROVER')" 
                      severity="info" [outlined]="true" styleClass="w-full text-left" class="quick-btn"></p-button>

            <div class="flex flex-column gap-1">
              <span class="text-500 text-xs font-semibold ml-1">Operators:</span>
              <div class="grid grid-nogutter gap-2">
                  <div class="col">
                      <p-button label="OP 1" icon="pi pi-user" (onClick)="quickLogin('DDO001_OP1')" 
                                severity="secondary" [outlined]="true" styleClass="w-full" class="quick-btn"></p-button>
                  </div>
                  <div class="col">
                      <p-button label="OP 2" icon="pi pi-user" (onClick)="quickLogin('DDO001_OP2')" 
                                severity="secondary" [outlined]="true" styleClass="w-full" class="quick-btn"></p-button>
                  </div>
                  <div class="col">
                      <p-button label="OP 3" icon="pi pi-user" (onClick)="quickLogin('DDO001_OP3')" 
                                severity="secondary" [outlined]="true" styleClass="w-full" class="quick-btn"></p-button>
                  </div>
              </div>
            </div>
        </div>
      </div>
  </p-card>
</div>
