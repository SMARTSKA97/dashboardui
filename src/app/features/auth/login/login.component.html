<div class="flex align-items-center justify-content-center min-h-screen surface-ground p-4">
  <p-card header="Financial Dashboard Login" [style]="{ 'max-width': '400px', 'width': '100%' }" class="shadow-8">
    <p-toast></p-toast>
    <div class="flex flex-column gap-4">
      <div class="flex flex-column gap-2">
        <label for="username">Username</label>
        <input pInputText id="username" [(ngModel)]="username" placeholder="Enter UserId" />
      </div>
      <div class="flex flex-column gap-2">
        <label for="password">Password</label>
        <p-password id="password" [(ngModel)]="password" [feedback]="false" [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full"></p-password>
      </div>
      <p-button label="Sign In" icon="pi pi-user" (onClick)="onLogin()" [loading]="loading" styleClass="w-full shadow-2 h-3rem"></p-button>
      
      <div class="mt-4 border-top-1 border-gray-100 pt-4">
        <span class="text-600 font-bold text-xs uppercase tracking-widest block mb-3 text-center">Instant Access (Demo Mode)</span>
        <div class="flex flex-column gap-2">
            <p-button label="Super Admin" icon="pi pi-shield" (onClick)="quickLogin('admin')" 
                      severity="contrast" [outlined]="true" styleClass="w-full text-left" class="quick-btn"></p-button>
            <div class="grid grid-nogutter gap-2">
                <div class="col">
                    <p-button label="Approver" icon="pi pi-check-circle" (onClick)="quickLogin('approver')" 
                              severity="info" [outlined]="true" styleClass="w-full" class="quick-btn"></p-button>
                </div>
                <div class="col">
                    <p-button label="Operator" icon="pi pi-user-edit" (onClick)="quickLogin('operator')" 
                              severity="secondary" [outlined]="true" styleClass="w-full" class="quick-btn"></p-button>
                </div>
            </div>
        </div>
      </div>
    </div>
  </p-card>
</div>
